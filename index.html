<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Bella Festa">
<title>Bella Festa Milano</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --blu:#5B8FA8;--blu2:#7AAFC5;--cream:#F0F6F9;--warm:#E8F2F7;
  --border:#B8D4E0;--text:#1A3040;--light:#5A8090;--green:#6BA898;--gold:#C4A87A;
}
html,body{height:100%;overflow:hidden;font-family:'Jost',sans-serif;background:var(--cream);color:var(--text)}
#app{display:flex;flex-direction:column;height:100vh}
.topbar{background:linear-gradient(135deg,#4A7A95,#5B8FA8);color:#F0F6F9;padding:0 1rem;height:48px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.brand{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:300;letter-spacing:.05em}
.brand em{font-style:italic;color:#D4E8F0}
.tabbar{display:flex;overflow-x:auto;background:var(--warm);border-bottom:1px solid var(--border);flex-shrink:0;scrollbar-width:none}
.tabbar::-webkit-scrollbar{display:none}
.tb{background:none;border:none;border-bottom:2px solid transparent;font-family:'Jost',sans-serif;font-size:.62rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--light);padding:.7rem .9rem;cursor:pointer;white-space:nowrap;flex-shrink:0;touch-action:manipulation}
.tb.on{color:var(--blu);border-bottom-color:var(--blu2)}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.panel{display:none;padding:1rem;max-width:800px;margin:0 auto;padding-bottom:5rem}
.panel.on{display:block}
.card{background:var(--warm);border:1px solid var(--border);border-radius:12px;padding:1rem;margin-bottom:.85rem}
.card-title{font-family:'Cormorant Garamond',serif;font-size:1rem;color:var(--blu);margin-bottom:.75rem;font-weight:500}
.btn{font-family:'Jost',sans-serif;font-size:.65rem;font-weight:600;letter-spacing:.15em;text-transform:uppercase;border:none;border-radius:8px;padding:.65em 1.4em;cursor:pointer;touch-action:manipulation;display:inline-flex;align-items:center;gap:.4em}
.btn-p{background:var(--blu);color:#F0F6F9}
.btn-s{background:transparent;border:1px solid var(--blu2);color:var(--blu)}
.btn-d{background:#B06555;color:#fff}
.btn-sm{padding:.45em .9em;font-size:.6rem}
.btn-full{width:100%;justify-content:center}
.fg{display:flex;flex-direction:column;gap:.2rem;margin-bottom:.65rem}
.fg label{font-size:.58rem;font-weight:600;letter-spacing:.13em;text-transform:uppercase;color:var(--light)}
.fg input,.fg select,.fg textarea{font-family:'Jost',sans-serif;font-size:.88rem;color:var(--text);background:#fff;border:1px solid var(--border);border-radius:8px;padding:.55rem .75rem;width:100%;-webkit-appearance:none}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--blu)}
.fg textarea{resize:vertical;min-height:100px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:.65rem}
.full{grid-column:1/-1}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem}
.cal-month{font-family:'Cormorant Garamond',serif;font-size:1.2rem;color:var(--blu);text-transform:capitalize}
.cal-arr{background:none;border:1px solid var(--border);border-radius:7px;padding:.28em .7em;cursor:pointer;color:var(--blu);font-size:.9rem;touch-action:manipulation}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-top:.5rem}
.cal-dn{text-align:center;font-size:.55rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--light);padding:.3rem 0}
.cal-day{background:#fff;border:1px solid var(--border);border-radius:7px;min-height:52px;padding:.28rem;cursor:pointer;touch-action:manipulation}
.cal-day.empty{background:transparent;border-color:transparent;cursor:default}
.cal-day.today{border-color:var(--blu);background:#E0EFF7}
.cal-day.has-ev{background:#D8EDF5}
.cal-day .dn{font-size:.65rem;font-weight:600;color:var(--blu);display:block}
.cal-ev{font-size:.52rem;background:var(--blu);color:#fff;border-radius:3px;padding:1px 3px;margin-top:1px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.cal-ev.quinceanos{background:#7A6BA8}
.cal-ev.fiesta_infantil{background:#6B8FA8}
.cal-ev.cumpleanos{background:#8A7A50}
.cal-ev.baby_shower{background:#6BA898}
.cal-ev.empresarial{background:#5A7080}
.cal-ev.ceremonia{background:#7A8B6A}
.cal-ev.personal{background:#8A7AAA}
.cli-card{background:var(--warm);border:1px solid var(--border);border-radius:11px;padding:.9rem 1rem;margin-bottom:.6rem;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:.75rem;touch-action:manipulation}
.cli-card:active{background:#D8EDF5}
.cli-name{font-family:'Cormorant Garamond',serif;font-size:1rem;color:var(--blu)}
.cli-sub{font-size:.72rem;color:var(--light);margin-top:.1rem}
.overlay{position:fixed;inset:0;background:rgba(26,48,64,.5);z-index:100;display:none;align-items:flex-end;justify-content:center}
.overlay.on{display:flex}
.modal{background:var(--warm);border-radius:16px 16px 0 0;width:100%;max-width:680px;max-height:93vh;overflow-y:auto;padding:1.2rem}
.modal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:1.3rem;color:var(--blu)}
.modal-close{background:none;border:none;font-size:1.1rem;cursor:pointer;color:var(--light);touch-action:manipulation;padding:.3rem}
.fin-row{display:grid;grid-template-columns:repeat(3,1fr);gap:.6rem;margin-bottom:.85rem}
.fin-box{background:#fff;border:1px solid var(--border);border-radius:10px;padding:.75rem;text-align:center}
.fin-lbl{font-size:.55rem;letter-spacing:.12em;text-transform:uppercase;color:var(--light);margin-bottom:.25rem}
.fin-val{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:600}
.vt{color:var(--blu)}.vg{color:var(--green)}.vw{color:var(--gold)}.vr{color:#B06555}
.forn-item{background:#fff;border:1px solid var(--border);border-radius:10px;padding:.85rem;margin-bottom:.65rem}
.img-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem;margin-top:.5rem}
.img-slot{aspect-ratio:1;border:2px dashed var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;background:#fff;position:relative;touch-action:manipulation}
.img-slot img{width:100%;height:100%;object-fit:cover}
.img-add{font-size:1.4rem;color:var(--light)}
.notif{position:fixed;bottom:1rem;left:50%;transform:translateX(-50%) translateY(100px);background:var(--blu);color:#fff;padding:.7rem 1.3rem;border-radius:9px;font-size:.76rem;z-index:999;transition:transform .3s;white-space:nowrap}
.notif.show{transform:translateX(-50%) translateY(0)}
.notif.err{background:#B06555}
.twrap{overflow-x:auto;border-radius:9px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:.8rem}
th{background:var(--blu);color:#fff;padding:.55rem .7rem;text-align:left;font-size:.6rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase}
td{padding:.55rem .7rem;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
.tr-tot td{background:var(--cream);font-weight:600;color:var(--blu);border-top:2px solid var(--border)}
.badge{font-size:.58rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:.18em .62em;border-radius:20px;display:inline-block}
.b-ok{background:#C8E6DF;color:#2A6B5E}.b-warn{background:#F5E4CC;color:#8B5E2A}.b-no{background:#F0D8CC;color:#8B4030}
.contract{background:#fff;border-radius:12px;padding:1.5rem;position:relative;overflow:hidden}
.contract::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--blu),var(--blu2),var(--gold))}
@media(max-width:500px){.g2{grid-template-columns:1fr}}
@media print{body>*:not(#app){display:none!important}.topbar,.tabbar{display:none!important}.content{overflow:visible!important;height:auto!important}.panel{padding:0!important}}
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="brand">Bella Festa <em>Milano</em></div>
    <button class="btn btn-sm" style="background:rgba(255,255,255,.2);color:#fff;border:1px solid rgba(255,255,255,.3)" onclick="showOv('ov-setup')">Config</button>
  </div>
  <nav class="tabbar">
    <button class="tb on" onclick="showTab('calendario',this)">📅 Calendario</button>
    <button class="tb" onclick="showTab('clienti',this)">👤 Clienti</button>
    <button class="tb" onclick="showTab('contabilita',this)">💶 Contabilità</button>
    <button class="tb" onclick="showTab('contratto',this)">📄 Contratto</button>
  </nav>
  <div class="content">

    <div class="panel on" id="panel-calendario">
      <div class="card">
        <div class="cal-nav">
          <button class="cal-arr" onclick="chMon(-1)">&#8249;</button>
          <div class="cal-month" id="cal-title"></div>
          <button class="cal-arr" onclick="chMon(1)">&#8250;</button>
        </div>
        <div class="cal-grid" id="cal-grid"></div>
      </div>
      <div class="card">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem">
          <div class="card-title" style="margin-bottom:0">Prossimi eventi</div>
          <button class="btn btn-s btn-sm" onclick="showOv('ov-personal')">+ Personale</button>
        </div>
        <div id="upcoming"></div>
      </div>
    </div>

    <div class="panel" id="panel-clienti">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.85rem">
        <div style="font-family:'Cormorant Garamond',serif;font-size:1.4rem;color:var(--blu)">Clienti</div>
        <button class="btn btn-p btn-sm" onclick="openForm(null)">+ Nuevo</button>
      </div>
      <input id="srch" type="text" placeholder="Cerca..." oninput="filterCli()" autocorrect="off"
        style="font-family:'Jost',sans-serif;font-size:.88rem;color:var(--text);background:#fff;border:1px solid var(--border);border-radius:8px;padding:.55rem .75rem;width:100%;margin-bottom:.85rem;-webkit-appearance:none">
      <div id="cli-list"></div>
    </div>

    <div class="panel" id="panel-contabilita">
      <div style="font-family:'Cormorant Garamond',serif;font-size:1.4rem;color:var(--blu);margin-bottom:.85rem">Contabilità</div>
      <div class="fin-row" id="fin-summary"></div>
      <div class="card">
        <div class="card-title">Riepilogo per Cliente</div>
        <div class="twrap">
          <table><thead><tr><th>Cliente</th><th>Tipo</th><th>Data</th><th>Totale</th><th>Versato</th><th>Residuo</th><th>Stato</th></tr></thead>
          <tbody id="cont-table"></tbody></table>
        </div>
      </div>
    </div>

    <div class="panel" id="panel-contratto">
      <div style="font-family:'Cormorant Garamond',serif;font-size:1.4rem;color:var(--blu);margin-bottom:.85rem">Contratto</div>
      <div class="card">
        <div class="fg"><label>Seleziona Cliente</label>
          <select id="con-sel" onchange="renderContract()" style="font-family:'Jost',sans-serif;font-size:.88rem;color:var(--text);background:#fff;border:1px solid var(--border);border-radius:8px;padding:.55rem .75rem;-webkit-appearance:none">
            <option value="">Scegli cliente...</option>
          </select>
        </div>
      </div>
      <div id="contract-out"></div>
    </div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="overlay" id="ov-detail">
  <div class="modal">
    <div class="modal-hd">
      <div class="modal-title" id="detail-title"></div>
      <button class="modal-close" onclick="closeOv('ov-detail')">✕</button>
    </div>
    <div id="detail-body"></div>
    <div style="display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.85rem">
      <button class="btn btn-p btn-sm" onclick="editFromDetail()">Modifica</button>
      <button class="btn btn-s btn-sm" onclick="contractFromDetail()">Contratto</button>
      <button class="btn btn-d btn-sm" onclick="deleteClient()">Elimina</button>
    </div>
  </div>
</div>

<!-- FORM MODAL -->
<div class="overlay" id="ov-form">
  <div class="modal" style="border-radius:16px;max-height:95vh">
    <div class="modal-hd">
      <div class="modal-title" id="form-title">Nuevo Cliente</div>
      <button class="modal-close" onclick="closeOv('ov-form')">✕</button>
    </div>
    <div id="form-body"></div>
  </div>
</div>

<!-- PERSONAL EVENT MODAL -->
<div class="overlay" id="ov-personal">
  <div class="modal" style="border-radius:16px">
    <div class="modal-hd">
      <div class="modal-title">Evento Personale</div>
      <button class="modal-close" onclick="closeOv('ov-personal')">✕</button>
    </div>
    <div class="g2">
      <div class="fg full"><label>Tipo</label>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:.4rem">
          <button type="button" id="pet-compleanno" onclick="setPET('compleanno',this)" class="btn btn-s btn-sm" style="touch-action:manipulation">🎂 Compleanno</button>
          <button type="button" id="pet-medico" onclick="setPET('medico',this)" class="btn btn-s btn-sm" style="touch-action:manipulation">🏥 Medico</button>
          <button type="button" id="pet-personale" onclick="setPET('personale',this)" class="btn btn-s btn-sm" style="touch-action:manipulation">💅 Personale</button>
          <button type="button" id="pet-altro" onclick="setPET('altro',this)" class="btn btn-s btn-sm" style="touch-action:manipulation">📝 Altro</button>
        </div>
        <input type="hidden" id="pe-tipo">
      </div>
      <div class="fg full"><label>Titolo *</label><input type="text" id="pe-titolo" autocorrect="off"></div>
      <div class="fg"><label>Data *</label><input type="date" id="pe-data"></div>
      <div class="fg"><label>Ora</label><input type="time" id="pe-ora"></div>
    </div>
    <button class="btn btn-p btn-full" style="margin-top:.75rem;touch-action:manipulation" onclick="savePersonal()">Salva</button>
  </div>
</div>

<!-- SETUP MODAL -->
<div class="overlay" id="ov-setup">
  <div class="modal" style="border-radius:16px">
    <div class="modal-hd">
      <div class="modal-title">Configurazione</div>
      <button class="modal-close" onclick="closeOv('ov-setup')">✕</button>
    </div>
    <p style="font-size:.8rem;color:var(--light);margin-bottom:.75rem">Google Sheets (opzionale)</p>
    <div class="fg"><label>Sheet ID</label><input type="text" id="s-id"></div>
    <div class="fg"><label>Service Account</label><input type="text" id="s-email"></div>
    <div class="fg"><label>Private Key</label><textarea id="s-key" style="min-height:70px;font-size:.65rem"></textarea></div>
    <button class="btn btn-p btn-full" style="margin-top:.5rem;touch-action:manipulation" onclick="saveSetup()">Salva</button>
    <button class="btn btn-s btn-full" style="margin-top:.4rem;touch-action:manipulation" onclick="closeOv('ov-setup')">Chiudi</button>
  </div>
</div>

<div class="notif" id="notif"></div>
<input type="file" id="img-inp" accept="image/*" multiple style="display:none" onchange="handleImgs(this)">

<script>
var clients=JSON.parse(localStorage.getItem('bfm_c')||'[]');
var personalEvs=JSON.parse(localStorage.getItem('bfm_pe')||'[]');
var cfg=JSON.parse(localStorage.getItem('bfm_cfg')||'{}');
var cM=new Date().getMonth(),cY=new Date().getFullYear();
var curId=null;
var MONTHS=['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
var DAYS=['L','M','M','G','V','S','D'];
var FORN_CATS=[{"v": "foto_video", "l": "\ud83d\udcf8 Foto e Video"}, {"v": "dj_audio", "l": "\ud83c\udfb5 DJ / Audio / Musica"}, {"v": "allestimento", "l": "\ud83d\udc90 Allestimento / Decorazione"}, {"v": "pasticceria", "l": "\ud83c\udf82 Pasticceria / Torta"}, {"v": "effetti", "l": "\u2728 Effetti Speciali / Luci"}, {"v": "catering", "l": "\ud83c\udf7d\ufe0f Catering"}, {"v": "limousine", "l": "\ud83d\ude97 Limousine / Trasporto"}, {"v": "makeup", "l": "\ud83d\udc84 Makeup"}, {"v": "animazione", "l": "\ud83c\udfaa Animazione / Show"}, {"v": "ayudante", "l": "\ud83d\udc64 Ayudante / Collaboratore"}, {"v": "altro", "l": "\ud83d\udccb Altro"}];
var EVENT_TYPES=[{"v": "matrimonio", "l": "\ud83d\udc92 Matrimonio"}, {"v": "quinceanos", "l": "\ud83d\udc51 Quincea\u00f1era"}, {"v": "fiesta_infantil", "l": "\ud83c\udf88 Fiesta Infantil"}, {"v": "cumpleanos", "l": "\ud83c\udf82 Cumplea\u00f1os"}, {"v": "baby_shower", "l": "\ud83d\udc76 Baby Shower / Gender Reveal"}, {"v": "empresarial", "l": "\ud83c\udfe2 Evento Empresarial"}, {"v": "ceremonia", "l": "\u26ea Ceremonia"}];

function sv(){localStorage.setItem('bfm_c',JSON.stringify(clients));}
function svPE(){localStorage.setItem('bfm_pe',JSON.stringify(personalEvs));}
function gv(id){var e=document.getElementById(id);return e?e.value:'';}
function sv2(id,v){var e=document.getElementById(id);if(e)e.value=v||'';}
function fd(d){if(!d)return'-';return new Date(d+'T12:00:00').toLocaleDateString('it-IT',{day:'2-digit',month:'long',year:'numeric'});}
function tl(t){var m={matrimonio:'Matrimonio',quinceanos:'Quinceañera',fiesta_infantil:'Fiesta Infantil',cumpleanos:'Cumpleaños',baby_shower:'Baby Shower/Gender Reveal',empresarial:'Evento Empresarial',ceremonia:'Ceremonia'};return m[t]||t||'-';}
function note(msg,err){var n=document.getElementById('notif');n.textContent=msg;n.className='notif show'+(err?' err':'');setTimeout(function(){n.className='notif';},3000);}
function showOv(id){document.getElementById(id).classList.add('on');}
function closeOv(id){document.getElementById(id).classList.remove('on');}
function tot(c){return parseFloat(c.totale||0);}
function paid(c){return parseFloat(c.acconto_cli||0);}

function showTab(name,btn){
  document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('on');});
  document.querySelectorAll('.tb').forEach(function(b){b.classList.remove('on');});
  document.getElementById('panel-'+name).classList.add('on');
  if(btn)btn.classList.add('on');
  if(name==='calendario')rCal();
  if(name==='clienti')rCli();
  if(name==='contabilita')rCont();
  if(name==='contratto')pConSel();
}

// CALENDAR
function rCal(){
  document.getElementById('cal-title').textContent=MONTHS[cM]+' '+cY;
  var g=document.getElementById('cal-grid');
  g.innerHTML=DAYS.map(function(d){return '<div class="cal-dn">'+d+'</div>';}).join('');
  var first=new Date(cY,cM,1).getDay(),off=first===0?6:first-1;
  for(var i=0;i<off;i++)g.innerHTML+='<div class="cal-day empty"></div>';
  var days=new Date(cY,cM+1,0).getDate(),td=new Date();
  for(var d=1;d<=days;d++){
    var iT=d===td.getDate()&&cM===td.getMonth()&&cY===td.getFullYear();
    var ds=cY+'-'+String(cM+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    var dc=clients.filter(function(c){return c.data===ds;});
    var dp=personalEvs.filter(function(e){return e.data===ds;});
    var evH=dc.map(function(c){return '<div class="cal-ev '+(c.tipo||'')+'">'+( c.alias||c.nome).substring(0,10)+'</div>';}).join('');
    evH+=dp.map(function(e){return '<div class="cal-ev personal">'+e.titolo.substring(0,8)+'</div>';}).join('');
    var cls='cal-day'+(iT?' today':'')+(dc.length||dp.length?' has-ev':'');
    g.innerHTML+='<div class="'+cls+'" onclick="onDay(''+ds+'')" style="touch-action:manipulation"><span class="dn">'+d+'</span>'+evH+'</div>';
  }
  rUpcoming();
}
function chMon(d){cM+=d;if(cM>11){cM=0;cY++;}if(cM<0){cM=11;cY--;}rCal();}
function onDay(ds){
  var c=clients.find(function(x){return x.data===ds;});
  if(c){openDetail(c.id);return;}
  var pe=personalEvs.filter(function(e){return e.data===ds;});
  if(pe.length){note(pe.map(function(e){return e.titolo;}).join(', '));}
}
function rUpcoming(){
  var td=new Date();td.setHours(0,0,0,0);
  var up=clients.filter(function(c){return c.data&&new Date(c.data+'T12:00:00')>=td;}).sort(function(a,b){return new Date(a.data)-new Date(b.data);}).slice(0,5);
  var el=document.getElementById('upcoming');
  if(!up.length){el.innerHTML='<p style="font-size:.8rem;color:var(--light)">Nessun evento in programma</p>';return;}
  el.innerHTML=up.map(function(c){
    var d=Math.ceil((new Date(c.data+'T12:00:00')-td)/86400000);
    return '<div class="cli-card" onclick="openDetail(''+c.id+'')"><div><div class="cli-name">'+(c.alias||c.nome)+'</div><div class="cli-sub">'+tl(c.tipo)+' · '+fd(c.data)+'</div></div><div style="font-size:.82rem;color:'+(d<=7?'#B06555':'var(--blu2)')+'">fra '+d+'gg</div></div>';
  }).join('');
}

// PERSONAL
function setPET(tipo,btn){
  document.getElementById('pe-tipo').value=tipo;
  ['compleanno','medico','personale','altro'].forEach(function(t){
    var b=document.getElementById('pet-'+t);
    if(b){b.style.background=t===tipo?'var(--blu)':'transparent';b.style.color=t===tipo?'#fff':'var(--blu)';}
  });
}
function savePersonal(){
  var ti=gv('pe-titolo').trim(),da=gv('pe-data');
  if(!ti||!da){note('Inserisci titolo e data!',1);return;}
  personalEvs.push({id:Date.now().toString(),titolo:ti,tipo:gv('pe-tipo')||'altro',data:da,ora:gv('pe-ora')});
  svPE();closeOv('ov-personal');rCal();note('Aggiunto! 🌸');
  sv2('pe-titolo','');sv2('pe-data','');sv2('pe-ora','');
}

// CLIENT LIST
function rCli(list){
  var el=document.getElementById('cli-list'),arr=list||clients;
  if(!arr.length){el.innerHTML='<p style="font-size:.82rem;color:var(--light)">Nessun cliente. Tocca + Nuevo!</p>';return;}
  el.innerHTML=arr.sort(function(a,b){return new Date(a.data||0)-new Date(b.data||0);}).map(function(c){
    var t=tot(c),p=paid(c),r=t-p;
    return '<div class="cli-card" onclick="openDetail(''+c.id+'')"><div><div class="cli-name">'+(c.alias||c.nome)+'</div><div class="cli-sub">'+tl(c.tipo)+' · '+fd(c.data)+'</div></div><div style="text-align:right"><div style="font-family:Cormorant Garamond,serif;font-size:1rem;font-weight:600;color:var(--blu)">€ '+t.toLocaleString('it-IT')+'</div><div style="font-size:.68rem;margin-top:.1rem">'+(r>0?'<span style="color:var(--gold)">Res. € '+r.toLocaleString('it-IT')+'</span>':'<span style="color:var(--green)">Saldato</span>')+'</div></div></div>';
  }).join('');
}
function filterCli(){var q=document.getElementById('srch').value.toLowerCase();rCli(clients.filter(function(c){return !q||(c.nome||'').toLowerCase().includes(q)||(c.alias||'').toLowerCase().includes(q);}));}

// CLIENT DETAIL
function openDetail(id){
  curId=id;var c=clients.find(function(x){return x.id===id;});if(!c)return;
  document.getElementById('detail-title').textContent=c.alias||c.nome;
  var t=tot(c),p=paid(c),r=t-p;
  var h='<div class="fin-row"><div class="fin-box"><div class="fin-lbl">Totale</div><div class="fin-val vt">€ '+t.toLocaleString('it-IT')+'</div></div><div class="fin-box"><div class="fin-lbl">Versato</div><div class="fin-val vg">€ '+p.toLocaleString('it-IT')+'</div></div><div class="fin-box"><div class="fin-lbl">Residuo</div><div class="fin-val vw">€ '+r.toLocaleString('it-IT')+'</div></div></div>';
  h+='<div class="card" style="font-size:.82rem">';
  if(c.nome)h+='<div style="margin-bottom:.3rem"><span style="font-size:.58rem;text-transform:uppercase;letter-spacing:.1em;color:var(--light)">Nome: </span>'+c.nome+'</div>';
  if(c.tel)h+='<div style="margin-bottom:.3rem"><span style="font-size:.58rem;text-transform:uppercase;letter-spacing:.1em;color:var(--light)">Tel: </span>'+c.tel+'</div>';
  if(c.email)h+='<div style="margin-bottom:.3rem"><span style="font-size:.58rem;text-transform:uppercase;letter-spacing:.1em;color:var(--light)">Email: </span>'+c.email+'</div>';
  if(c.cf)h+='<div style="margin-bottom:.3rem"><span style="font-size:.58rem;text-transform:uppercase;letter-spacing:.1em;color:var(--light)">CF: </span>'+c.cf+'</div>';
  h+='</div>';
  h+='<div class="card" style="font-size:.82rem">';
  h+='<div style="margin-bottom:.3rem"><span style="font-size:.58rem;text-transform:uppercase;letter-spacing:.1em;color:var(--light)">Tipo: </span>'+tl(c.tipo)+'</div>';
  h+='<div style="margin-bottom:.3rem"><span style="font-size:.58rem;text-transform:uppercase;letter-spacing:.1em;color:var(--light)">Data: </span>'+fd(c.data)+(c.oraI?' ore '+c.oraI:'')+(c.oraF?' - '+c.oraF:'')+'</div>';
  if(c.indirizzo)h+='<div style="margin-bottom:.3rem"><span style="font-size:.58rem;text-transform:uppercase;letter-spacing:.1em;color:var(--light)">Location: </span>'+c.indirizzo+'</div>';
  if(c.ospiti)h+='<div style="margin-bottom:.3rem"><span style="font-size:.58rem;text-transform:uppercase;letter-spacing:.1em;color:var(--light)">Ospiti: </span>'+c.ospiti+'</div>';
  if(c.colore)h+='<div style="margin-bottom:.3rem"><span style="font-size:.58rem;text-transform:uppercase;letter-spacing:.1em;color:var(--light)">Colore/Tema: </span>'+c.colore+'</div>';
  h+='</div>';
  if(c.descrizione)h+='<div class="card"><div class="card-title">Descrizione Servizi</div><p style="font-size:.82rem;line-height:1.6;white-space:pre-wrap">'+c.descrizione+'</p></div>';
  if(c.fornitori&&c.fornitori.length)h+='<div class="card"><div class="card-title">Fornitori</div>'+c.fornitori.map(function(f){return '<div style="font-size:.82rem;padding:.3rem 0;border-bottom:1px solid var(--border)"><strong>'+f.cat_label+'</strong> — '+(f.nome||'-')+'<br><span style="color:var(--light);font-size:.75rem">'+(f.ora_i?f.ora_i+' → '+f.ora_f:'')+'</span></div>';}).join('')+'</div>';
  if(c.imgs&&c.imgs.length)h+='<div class="card"><div class="card-title">Immagini</div><div class="img-grid">'+c.imgs.map(function(s){return '<div class="img-slot"><img src="'+s+'"></div>';}).join('')+'</div></div>';
  document.getElementById('detail-body').innerHTML=h;
  showOv('ov-detail');
}
function editFromDetail(){closeOv('ov-detail');openForm(curId);}
function contractFromDetail(){closeOv('ov-detail');sv2('con-sel',curId);renderContract();showTab('contratto',document.querySelectorAll('.tb')[3]);}
function deleteClient(){if(!confirm('Eliminare?'))return;clients=clients.filter(function(c){return c.id!==curId;});sv();closeOv('ov-detail');rCli();rCal();rCont();pConSel();note('Eliminato');}

// FORM
var _forn=[];
var _imgs=[];
function openForm(id){
  var c=id?clients.find(function(x){return x.id===id;}):null;
  _forn=c&&c.fornitori?JSON.parse(JSON.stringify(c.fornitori)):[];
  _imgs=c&&c.imgs?c.imgs.slice():[];
  document.getElementById('form-title').textContent=c?'Modifica: '+(c.alias||c.nome):'Nuevo Cliente';
  document.getElementById('form-body').innerHTML=buildForm(c);
  showOv('ov-form');
  rForn();rImgs();
}

function buildForm(c){
  var typeOpts=EVENT_TYPES.map(function(t){return '<option value="'+t.v+'"'+(c&&c.tipo===t.v?' selected':'')+'>'+t.l+'</option>';}).join('');
  var h='<div style="padding-bottom:1.5rem">';
  // CLIENTE
  h+='<div class="card"><div class="card-title">👤 Dati Cliente</div><div class="g2">';
  h+='<div class="fg full"><label>Nome Completo *</label><input id="f-nome" type="text" autocorrect="off" value="'+(c?c.nome||'':'')+'"></div>';
  h+='<div class="fg full"><label>Alias / Nome Evento</label><input id="f-alias" type="text" autocorrect="off" value="'+(c?c.alias||'':'')+'"></div>';
  h+='<div class="fg"><label>Telefono</label><input id="f-tel" type="tel" value="'+(c?c.tel||'':'')+'"></div>';
  h+='<div class="fg"><label>Email</label><input id="f-email" type="email" autocorrect="off" value="'+(c?c.email||'':'')+'"></div>';
  h+='<div class="fg full"><label>Codice Fiscale</label><input id="f-cf" type="text" autocapitalize="characters" value="'+(c?c.cf||'':'')+'"></div>';
  h+='</div></div>';
  // EVENTO
  h+='<div class="card"><div class="card-title">🎊 Dati Evento</div><div class="g2">';
  h+='<div class="fg"><label>Tipo Evento *</label><select id="f-tipo" style="-webkit-appearance:none"><option value="">Seleziona...</option>'+typeOpts+'</select></div>';
  h+='<div class="fg"><label>Data Evento *</label><input id="f-data" type="date" value="'+(c?c.data||'':'')+'"></div>';
  h+='<div class="fg"><label>Ora Inizio</label><input id="f-orai" type="time" value="'+(c?c.oraI||'':'')+'"></div>';
  h+='<div class="fg"><label>Ora Fine</label><input id="f-oraf" type="time" value="'+(c?c.oraF||'':'')+'"></div>';
  h+='<div class="fg full"><label>Indirizzo / Location</label><input id="f-ind" type="text" autocorrect="off" value="'+(c?c.indirizzo||'':'')+'"></div>';
  h+='<div class="fg"><label>N° Ospiti</label><input id="f-ospiti" type="number" value="'+(c?c.ospiti||'':'')+'"></div>';
  h+='<div class="fg"><label>Colore / Tematica</label><input id="f-colore" type="text" autocorrect="off" value="'+(c?c.colore||'':'')+'"></div>';
  h+='</div></div>';
  // DESCRIZIONE
  h+='<div class="card"><div class="card-title">📝 Descrizione Servizi</div>';
  h+='<textarea id="f-desc" autocorrect="off" style="min-height:140px">'+(c?c.descrizione||'':'')+'</textarea></div>';
  // PAGAMENTI
  h+='<div class="card"><div class="card-title">💶 Pagamento Cliente</div><div class="g2">';
  h+='<div class="fg"><label>Totale Contratto €</label><input id="f-tot" type="number" value="'+(c?c.totale||'':'')+'" oninput="updRes()" style="-webkit-appearance:none"></div>';
  h+='<div class="fg"><label>Acconto Ricevuto €</label><input id="f-acc" type="number" value="'+(c?c.acconto_cli||'':'')+'" oninput="updRes()" style="-webkit-appearance:none"></div>';
  h+='<div class="fg full"><label>Saldo Residuo</label><div id="f-res" style="font-size:1rem;font-weight:600;color:var(--gold);padding:.55rem 0">€ '+((parseFloat(c&&c.totale||0))-(parseFloat(c&&c.acconto_cli||0))).toLocaleString('it-IT')+'</div></div>';
  h+='</div></div>';
  // FORNITORI
  h+='<div class="card"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.65rem"><div class="card-title" style="margin-bottom:0">🤝 Fornitori</div><button type="button" class="btn btn-s btn-sm" onclick="addForn()" style="touch-action:manipulation">+ Aggiungi</button></div><div id="forn-list"></div></div>';
  // IMMAGINI
  h+='<div class="card"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem"><div class="card-title" style="margin-bottom:0">🖼️ Immagini Riferimento</div><button type="button" class="btn btn-s btn-sm" onclick="document.getElementById('img-inp').click()" style="touch-action:manipulation">+ Aggiungi</button></div><div class="img-grid" id="img-list"></div></div>';
  // NOTE
  h+='<div class="card"><div class="card-title">📋 Note</div><textarea id="f-note" autocorrect="off" style="min-height:80px">'+(c?c.note||'':'')+'</textarea></div>';
  h+='<div style="padding-bottom:1rem"><button type="button" class="btn btn-p btn-full" onclick="saveClient()" style="touch-action:manipulation;font-size:.75rem;padding:.8em">💾 Salva Cliente</button></div>';
  h+='<input type="hidden" id="f-id" value="'+(c?c.id:'')+'"></div>';
  return h;
}

function updRes(){
  var t=parseFloat(gv('f-tot'))||0,a=parseFloat(gv('f-acc'))||0;
  var el=document.getElementById('f-res');
  if(el)el.textContent='€ '+(t-a).toLocaleString('it-IT');
}

// FORNITORI
function addForn(){_forn.push({cat:'',cat_label:'',nome:'',ora_i:'',ora_f:'',prezzo:'',acconto:'',desc:''});rForn();}
function rForn(){
  var el=document.getElementById('forn-list');if(!el)return;
  if(!_forn.length){el.innerHTML='<p style="font-size:.78rem;color:var(--light)">Nessun fornitore</p>';return;}
  el.innerHTML=_forn.map(function(f,i){
    var catOpts=FORN_CATS.map(function(c){return '<option value="'+c.v+'"'+(f.cat===c.v?' selected':'')+'>'+c.l+'</option>';}).join('');
    var res=(parseFloat(f.prezzo||0)-parseFloat(f.acconto||0));
    return '<div class="forn-item">'
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem"><strong style="font-size:.82rem;color:var(--blu)">'+(f.cat_label||'Fornitore '+(i+1))+'</strong><button type="button" class="btn btn-d btn-sm" onclick="_forn.splice('+i+',1);rForn()" style="touch-action:manipulation">✕</button></div>'
      +'<div class="fg"><label>Servizio</label><select onchange="_forn['+i+'].cat=this.value;_forn['+i+'].cat_label=this.options[this.selectedIndex].text;rForn()" style="-webkit-appearance:none;font-size:.82rem;padding:5px 8px;border:1px solid var(--border);border-radius:6px;background:#fff;width:100%"><option value="">Seleziona...</option>'+catOpts+'</select></div>'
      +'<div class="fg"><label>Nome Fornitore</label><input type="text" value="'+(f.nome||'')+'" oninput="_forn['+i+'].nome=this.value" autocorrect="off" style="font-size:.82rem;padding:5px 8px;border:1px solid var(--border);border-radius:6px;background:#fff"></div>'
      +'<div class="g2">'
      +'<div class="fg"><label>Ora Inizio</label><input type="time" value="'+(f.ora_i||'')+'" oninput="_forn['+i+'].ora_i=this.value" style="font-size:.82rem;padding:5px 8px;border:1px solid var(--border);border-radius:6px;background:#fff"></div>'
      +'<div class="fg"><label>Ora Fine</label><input type="time" value="'+(f.ora_f||'')+'" oninput="_forn['+i+'].ora_f=this.value" style="font-size:.82rem;padding:5px 8px;border:1px solid var(--border);border-radius:6px;background:#fff"></div>'
      +'<div class="fg"><label>Prezzo Accordato €</label><input type="number" value="'+(f.prezzo||'')+'" oninput="_forn['+i+'].prezzo=this.value;rForn()" placeholder="0" style="font-size:.82rem;padding:5px 8px;border:1px solid var(--border);border-radius:6px;background:#fff;-webkit-appearance:none"></div>'
      +'<div class="fg"><label>Acconto €</label><input type="number" value="'+(f.acconto||'')+'" oninput="_forn['+i+'].acconto=this.value;rForn()" placeholder="0" style="font-size:.82rem;padding:5px 8px;border:1px solid var(--border);border-radius:6px;background:#fff;-webkit-appearance:none"></div>'
      +'</div>'
      +'<div class="fg"><label>Saldo Restante (uso interno)</label><div style="font-size:.9rem;font-weight:600;color:'+(res>0?'var(--gold)':'var(--green)')+'">€ '+res.toLocaleString('it-IT')+'</div></div>'
      +'<div class="fg"><label>Descrizione</label><textarea oninput="_forn['+i+'].desc=this.value" style="font-size:.8rem;padding:5px 8px;border:1px solid var(--border);border-radius:6px;background:#fff;min-height:60px;width:100%;resize:vertical;font-family:Jost,sans-serif">'+(f.desc||'')+'</textarea></div>'
      +'</div>';
  }).join('');
}

// IMAGES
function handleImgs(inp){
  Array.from(inp.files).forEach(function(f){
    var r=new FileReader();
    r.onload=function(e){_imgs.push(e.target.result);rImgs();};
    r.readAsDataURL(f);
  });
  inp.value='';
}
function rImgs(){
  var el=document.getElementById('img-list');if(!el)return;
  el.innerHTML=_imgs.map(function(s,i){
    return '<div class="img-slot"><img src="'+s+'"><button onclick="_imgs.splice('+i+',1);rImgs()" style="position:absolute;top:2px;right:2px;background:rgba(176,101,85,.85);color:#fff;border:none;border-radius:50%;width:18px;height:18px;font-size:.6rem;cursor:pointer;touch-action:manipulation">✕</button></div>';
  }).join('');
}

// SAVE CLIENT
function saveClient(){
  var nome=gv('f-nome').trim();
  if(!nome){note('Inserisci il nome!',1);return;}
  var id=gv('f-id')||Date.now().toString();
  var c={
    id:id,nome:nome,alias:gv('f-alias'),tel:gv('f-tel'),
    email:gv('f-email'),cf:gv('f-cf'),tipo:gv('f-tipo'),
    data:gv('f-data'),oraI:gv('f-orai'),oraF:gv('f-oraf'),
    indirizzo:gv('f-ind'),ospiti:gv('f-ospiti'),colore:gv('f-colore'),
    descrizione:gv('f-desc'),totale:gv('f-tot'),acconto_cli:gv('f-acc'),
    note:gv('f-note'),fornitori:JSON.parse(JSON.stringify(_forn)),
    imgs:_imgs.slice()
  };
  var ix=clients.findIndex(function(x){return x.id===id;});
  if(ix>=0)clients[ix]=c;else clients.push(c);
  sv();rCli();rCal();rCont();pConSel();
  closeOv('ov-form');
  note('Cliente salvato! 🌸');
}

// CONTABILITA
function rCont(){
  var tC=0,tV=0,tR=0;
  document.getElementById('cont-table').innerHTML=clients.map(function(c){
    var t=tot(c),p=paid(c),r=t-p;tC+=t;tV+=p;tR+=r;
    var st=r<=0?'<span class="badge b-ok">Saldato</span>':p>0?'<span class="badge b-warn">Parziale</span>':'<span class="badge b-no">Attesa</span>';
    return '<tr onclick="openDetail(''+c.id+'')" style="cursor:pointer"><td><strong>'+(c.alias||c.nome)+'</strong></td><td>'+tl(c.tipo)+'</td><td>'+fd(c.data)+'</td><td>€ '+t.toLocaleString('it-IT')+'</td><td style="color:var(--green)">€ '+p.toLocaleString('it-IT')+'</td><td style="color:'+(tR>0?'var(--gold)':'var(--green)')+'">€ '+r.toLocaleString('it-IT')+'</td><td>'+st+'</td></tr>';
  }).join('')+'<tr class="tr-tot"><td colspan="3">TOTALE</td><td>€ '+tC.toLocaleString('it-IT')+'</td><td>€ '+tV.toLocaleString('it-IT')+'</td><td>€ '+tR.toLocaleString('it-IT')+'</td><td></td></tr>';
  document.getElementById('fin-summary').innerHTML='<div class="fin-box"><div class="fin-lbl">Totale</div><div class="fin-val vt">€ '+tC.toLocaleString('it-IT')+'</div></div><div class="fin-box"><div class="fin-lbl">Incassato</div><div class="fin-val vg">€ '+tV.toLocaleString('it-IT')+'</div></div><div class="fin-box"><div class="fin-lbl">Da Incassare</div><div class="fin-val vw">€ '+tR.toLocaleString('it-IT')+'</div></div>';
}

// CONTRACT
function pConSel(){
  var o='<option value="">Scegli cliente...</option>'+clients.map(function(c){return '<option value="'+c.id+'">'+(c.alias||c.nome)+' - '+fd(c.data)+'</option>';}).join('');
  var e=document.getElementById('con-sel');if(e)e.innerHTML=o;
}
function renderContract(){
  var id=gv('con-sel'),el=document.getElementById('contract-out');
  if(!id){el.innerHTML='';return;}
  var c=clients.find(function(x){return x.id===id;});if(!c)return;
  var t=tot(c),p=paid(c),r=t-p;
  el.innerHTML='<div class="contract">'
    +'<div style="text-align:center;margin-bottom:1.2rem;padding-bottom:1rem;border-bottom:1px solid var(--border)">'
    +'<div style="font-family:Cormorant Garamond,serif;font-size:1.6rem;color:var(--blu)">Bella Festa Milano</div>'
    +'<div style="font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;color:var(--light);margin:.2rem 0">P.IVA 14245070967</div>'
    +'<div style="font-family:Cormorant Garamond,serif;font-size:1.1rem;color:var(--blu);margin-top:.5rem">Contratto — '+tl(c.tipo)+'</div>'
    +'</div>'
    +'<div style="font-size:.82rem;margin-bottom:1rem"><strong>Cliente:</strong> '+c.nome+(c.cf?' | CF: '+c.cf:'')+'<br>'+(c.tel?'<strong>Tel:</strong> '+c.tel+'<br>':'')+(c.email?'<strong>Email:</strong> '+c.email+'<br>':'')+'</div>'
    +'<div style="font-size:.82rem;margin-bottom:1rem"><strong>Data Evento:</strong> '+fd(c.data)+(c.oraI?' ore '+c.oraI:'')+(c.oraF?' - '+c.oraF:'')+(c.indirizzo?'<br><strong>Location:</strong> '+c.indirizzo:'')+(c.ospiti?'<br><strong>Ospiti:</strong> '+c.ospiti:'')+'</div>'
    +(c.descrizione?'<div style="background:var(--cream);border-radius:8px;padding:.85rem;margin-bottom:1rem;font-size:.82rem;line-height:1.7;white-space:pre-wrap"><strong>Servizi inclusi:</strong><br>'+c.descrizione+'</div>':'')
    +'<div style="font-size:.82rem;margin-bottom:1rem"><strong>Totale contratto:</strong> € '+t.toLocaleString('it-IT')+'<br><strong>Acconto ricevuto:</strong> € '+p.toLocaleString('it-IT')+'<br><strong>Saldo residuo:</strong> <span style="font-weight:600;color:var(--gold)">€ '+r.toLocaleString('it-IT')+'</span></div>'
    +'<div style="font-size:.78rem;line-height:1.8;margin-bottom:1.2rem"><strong>Condizioni:</strong><br>1. Saldo in contanti prima dell'evento.<br>2. Acconti non rimborsabili.<br>3. Modifiche entro 15 giorni dall'evento.<br>4. La firma implica accettazione.</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-top:1.5rem;padding-top:1rem;border-top:1px solid var(--border)">'
    +'<div><div style="border-bottom:1px solid var(--text);margin-bottom:.3rem;height:40px"></div><div style="font-family:Cormorant Garamond,serif;font-size:.9rem;font-style:italic;color:var(--blu)">Katherinne Fernández</div><div style="font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:var(--light)">Event Planner</div></div>'
    +'<div><div style="border-bottom:1px solid var(--text);margin-bottom:.3rem;height:40px"></div><div style="font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:var(--light)">Firma Cliente</div></div>'
    +'</div></div>'
    +'<div style="display:flex;gap:.5rem;margin-top:.75rem"><button class="btn btn-p btn-sm" onclick="window.print()" style="touch-action:manipulation">🖨️ Stampa / PDF</button></div>';
}

// SETUP
function saveSetup(){
  cfg={sheetId:gv('s-id').trim(),email:gv('s-email').trim(),key:gv('s-key').trim()};
  localStorage.setItem('bfm_cfg',JSON.stringify(cfg));
  closeOv('ov-setup');note('Salvato!');
}

// INIT
rCal();rCli();rCont();pConSel();
</script>
</body>
</html>
